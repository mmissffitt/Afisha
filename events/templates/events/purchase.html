{% extends 'events/base.html' %}
{% load static %}

{% block title %}Покупка билетов{% endblock %}

{% block content %}
<main>
    <div class="purchase-container">
        <h1 class="purchase-title">Оформление заказа</h1>
        
        <div style="margin-bottom: 30px; padding: 20px; background: #F8FAFC; border-radius: 12px;">
            <h3>{{ event.title }}</h3>
            <p><strong>📅</strong> {{ event.get_date_display }}</p>
            <p><strong>📍</strong> {{ event.venue }}</p>
            <p><strong>💰</strong> {{ event.get_price_display }}</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">Ваше имя</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" class="form-control" id="phone" name="phone" required>
            </div>
            
            <div class="form-group">
                <label for="quantity">Количество билетов</label>
                <input type="number" class="form-control" id="quantity" name="quantity" min="1" max="10" value="1">
            </div>
            
            <button type="submit" class="btn-buy" style="width: 100%; padding: 15px; margin-top: 20px;">
                Оплатить
            </button>
        </form>
    </div>
</main>
{% endblock %}
